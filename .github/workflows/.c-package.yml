name: C/C++ CI

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        configs: [Release]
    steps:
    - name: Checkout
      uses: actions/checkout@v2.0.0
    - name: Dependencies
      run: sudo apt update && sudo apt install -y git make gcc freeglut3-dev libglew-dev libsdl2-dev libsdl2-mixer-dev
    - name: Compile
      run: make prefix="$(pwd)/avdl"
    - name: Install
      run: make prefix="$(pwd)/avdl" install && tar cf custom_build.tar avdl/
    - uses: actions/upload-artifact@v2
      with:
        path: avdl/custom_build.tar
        name: avdl_${{ matrix.os }}_${{ matrix.configs }}.tar
