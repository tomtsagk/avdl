name: C/C++ CI

# only execute on new version tags (ex. v0.0.0)
on: # [push]
  push:
    tags:
     - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        configs: [Release]
    steps:
    - name: Checkout
      uses: actions/checkout@v2.0.0
    - name: Dependencies
      run: sudo apt update && sudo apt install -y git make gcc freeglut3-dev libglew-dev libsdl2-dev libsdl2-mixer-dev
    - name: Compile
      run: make prefix="$(pwd)/avdl"
    - name: Install
      run: make prefix="$(pwd)/avdl" install && tar cf avdl.tar avdl/
    - name: Version
      id: version
      run: echo "::set-output name=version::$(./avdl/bin/avdl --version)"
#    - uses: actions/upload-artifact@v2
#      with:
#        path: avdl.tar
#        name: avdl-${{ matrix.os }}-${{ matrix.configs }}.tar
    - name: Create Release
      id: create_release
      uses: actions/create-release@latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.version.outputs.version }}
        body: |
          Automated release.
        draft: true
        prerelease: false
    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./avdl.tar
          asset_name: avdl-binary.tar
          asset_content_type: application/zip
