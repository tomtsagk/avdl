name: Merge

# only execute on new version tags (ex. v0.0.0)
on:
  push:
    branches:
      github-test-stable

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2.0.0
      run: |
        git clone "https://$GITHUB_ACTOR:${{ secrets.GITHUB_TOKEN }}@github.com/tomtsagk/avdl.git"
        cd avdl
        git checkout github-test-stable
        git pull
        git checkout github-test
        git pull
        git merge github-test-stable
        git push
