name: C/C++ CI

# only execute on new version tags (ex. v0.0.0)
on:
  push:
    branches:
      github-test-stable

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2.0.0
      with:
        fetch-depth: 0
    - name: Merge
      run: |
        echo "merging"
        git checkout github-test
        git merge github-test-stable
        git push
